services:
  mysql:
    image: mysql:8.4
    container_name: mopl-mysql-local

    ports:
      - "3306:3306"

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mopl
      MYSQL_USER: mopl
      MYSQL_PASSWORD: mopl1234
      TZ: Asia/Seoul

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./mopl-persistence/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro


