server:
  port: 8080

spring:
  application:
    name: mopl-api
  config:
    import: optional:file:.env[.properties], optional:file:../.env[.properties]
  profiles:
    include: persistence
    active: ${SPRING_PROFILES_ACTIVE:dev}
    group:
      dev: persistence-dev
      local: persistence-local
      prod: persistence-prod
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Email
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GOOGLE_MAIL_USERNAME}
    password: ${GOOGLE_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true