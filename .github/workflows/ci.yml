name: CI

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # JDK 17 설치 + Gradle 캐시 활성화
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # gradlew 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 테스트 + 커버리지 검증 + 멀티모듈 집계 리포트 생성
      - name: Run tests and JaCoCo verification
        run: ./gradlew test jacocoTestCoverageVerification jacocoRootReport

      # 테스트 성공/실패와 관계없이 테스트 결과 파일 업로드
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/test/**
            **/build/test-results/test/**

      # 테스트 성공/실패와 관계없이 JaCoCo 커버리지 리포트 파일을 업로드
      # (CI 결과 화면에서 다운로드해서 확인 가능)
      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            **/build/reports/jacoco/test/html/**
            **/build/reports/jacoco/test/jacocoTestReport.xml
            build/reports/jacoco/jacocoRootReport/**

  build:
    runs-on: ubuntu-latest
    # test 잡이 성공해야 build 실행
    needs: test

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 빌드 실행 - 패키징/컴파일 산출물 생성
      - name: Build artifact
        run: ./gradlew assemble
